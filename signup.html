<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Samaze - Auth</title>
    <style>
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            font-family:Arial;
        }
        .box{
            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: absolute; 
            top: 50%;             
            right: 50px;          
            transform: translateY(-50%); 
            width: 300px;
        }
        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:14px;
        }
        button{
            width:100%;
            padding:12px;
            background:#667eea;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
        button:hover{
            background:#5a67d8;
        }
        button:disabled{
            background:#a0a0f0;
            cursor:not-allowed;
        }
        p{text-align:center; font-size:14px;}
        span.link{color:#667eea; cursor:pointer; font-weight:bold;}
        #msg{color:red; text-align:center; margin-top:10px; font-size:14px;}
        .hidden{display:none;}
    </style>
</head>
<body>

<div class="box">
    <h2 id="formTitle">Login</h2>

    <!-- Signup Form -->
    <form id="signupForm" class="hidden">
        <input type="text" id="signupUsername" placeholder="Full username" required>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password" required>
        <button type="submit" id="signupBtn">Signup</button>
    </form>

    <!-- Login Form -->
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit" id="loginBtn">Login</button>
    </form>

    <p id="switchText">
        Don't have an account? <span id="showSignup" class="link">Signup</span>
        <span id="showLogin" class="link hidden">Login</span>
    </p>

    <p id="msg"></p>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const signupForm = document.getElementById("signupForm");
    const loginForm = document.getElementById("loginForm");
    const showLogin = document.getElementById("showLogin");
    const showSignup = document.getElementById("showSignup");
    const formTitle = document.getElementById("formTitle");
    const msg = document.getElementById("msg");

    function resetForms() {
        msg.innerText = "";
        loginForm.reset();
        signupForm.reset();
        loginForm.classList.remove("hidden");
        signupForm.classList.add("hidden");
        showLogin.classList.add("hidden");
        showSignup.classList.remove("hidden");
        formTitle.innerText = "Login";
    }
    resetForms();

    showSignup.addEventListener("click", () => {
        loginForm.classList.add("hidden");
        signupForm.classList.remove("hidden");
        showSignup.classList.add("hidden");
        showLogin.classList.remove("hidden");
        formTitle.innerText = "Signup";
        msg.innerText = "";
    });

    showLogin.addEventListener("click", () => {
        signupForm.classList.add("hidden");
        loginForm.classList.remove("hidden");
        showLogin.classList.add("hidden");
        showSignup.classList.remove("hidden");
        formTitle.innerText = "Login";
        msg.innerText = "";
    });
    // SIGNUP
    signupForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = signupUsername.value.trim();
        const email = signupEmail.value.trim();
        const password = signupPassword.value.trim();

        try {
            const res = await fetch("http://localhost:5000/api/auth/signup", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();

            if (res.ok && data.success) {
                alert("Signup successful! Please login.");
                showLogin.click();
            } else {
                msg.innerText = data.message || "Signup failed";
            }

        } catch (err) {
            msg.innerText = "Server error";
        }
    });
    // LOGIN
    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();

        try {
            const res = await fetch("http://localhost:5000/api/auth/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (res.ok && data.success) {

                localStorage.setItem("token", data.token);
                localStorage.setItem("user", JSON.stringify(data.user));

                window.location.href = "home.html";

            } else {
                msg.innerText = data.message || "Login failed";
            }

        } catch (err) {
            msg.innerText = "Server error";
        }
    });

});
</script>
</body>
</html>
