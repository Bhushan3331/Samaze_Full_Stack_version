<!-- Search Page Fragment -->
<div class="search-page">
    <!-- Search Input -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for people or posts..." />
        <button id="searchBtn">Search</button>
    </div>

    <!-- Toggle Users / Posts -->
    <div class="search-toggle">
        <button class="toggle-btn active" id="toggleUsers">Users</button>
        <button class="toggle-btn" id="togglePosts">Posts</button>
    </div>

    <!-- Empty / Placeholder -->
    <div class="search-empty" id="searchEmpty">
        <div class="search-icon">🔍</div>
        <p>Search for people or posts</p>
    </div>

    <!-- Search Results -->
    <div id="searchResults"></div>
</div>
